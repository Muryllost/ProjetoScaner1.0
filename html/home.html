<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Estoque QR</title>
  
  <link rel="stylesheet" href="style.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

  <nav>
    <button id="tab-scanner" class="active"><span class="material-symbols-outlined">qr_code_scanner</span> Escanear</button>
    <button id="tab-estoque"><span class="material-symbols-outlined">inventory_2</span> Estoque</button>
    <button id="tab-perfil"><span class="material-symbols-outlined">person</span> Perfil</button>
  </nav>

  <main id="main-content">
    <section id="tela-scanner" class="tela ativa">
      <h2>Leitor de QR Code</h2>
      <div id="reader"></div>
      <button class="btn btn-danger" id="btn-parar-camera">Parar Câmera</button>
      <button class="btn" id="btn-ligar-camera">Ligar Câmera</button>
    </section>

    <section id="tela-estoque" class="tela">
      <h2>Histórico de Movimentações</h2>
      <ul class="lista-estoque" id="lista-produtos"></ul>
      <button class="btn btn-danger" id="btn-limpar-estoque">Limpar Dados</button>
    </section>

    <section id="tela-perfil" class="tela">
      <div id="area-login">
        <h2>Identificação</h2>
        <div class="input-wrapper">
          <input type="text" id="input-nome" placeholder="Digite seu Nome ou Matrícula" required />
        </div>
        <button class="btn" id="btn-login">Entrar</button>
      </div>

      <div id="area-logada" style="display: none;">
        <h2>Meu Perfil</h2>
        <div class="card-perfil">
          <h3 id="nome-logado">Nome</h3>
          <p>Operador de Estoque</p>
          <hr>
          <p>Leituras na sessão: <strong id="total-leituras">0</strong></p>
        </div>
        <button class="btn btn-danger" id="btn-logout">Sair</button>
      </div>
    </section>
  </main>

  <dialog id="modal-movimento">
    <form method="dialog" id="form-movimento">
      <h2>Registrar Item</h2>
      <p>Código Lido: <strong id="modal-codigo-lido" style="color: var(--primary);"></strong></p>
      
      <div class="input-wrapper">
        <label for="movimento-tipo">Tipo de Movimentação:</label>
        <select id="movimento-tipo">
          <option value="ENTRADA">Entrada (Adicionar ao estoque)</option>
          <option value="SAIDA">Saída (Retirar do estoque)</option>
        </select>
      </div>

      <div class="input-wrapper">
        <label for="movimento-qtd">Quantidade:</label>
        <input type="number" id="movimento-qtd" value="1" min="1" required />
      </div>

      <div class="modal-botoes">
        <button type="button" class="btn" id="salvar-movimento">Confirmar</button>
        <button type="button" class="btn btn-danger close-modal" id="cancelar-movimento">Cancelar</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
