<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scanner - Logística QR</title>
    <link rel="stylesheet" href="scanner.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  <body>
    <header>
      <a href="scanner.html" class="active"
        ><span class="material-symbols-outlined">qr_code_scanner</span
        >Escanear</a
      >
      <a href="estoque.html"
        ><span class="material-symbols-outlined">local_shipping</span
        >Logística</a
      >
      <button class="logout" id="btn-logout">
        <span class="material-symbols-outlined">logout</span>Sair
      </button>
    </header>

    <main>
      <h2>Leitor de Produtos</h2>
      <p>Operador: <strong id="nome-operador"></strong></p>

      <div id="reader"></div>

      <button class="btn btn-danger" id="btn-parar-camera">Parar Câmara</button>
      <button class="btn" id="btn-ligar-camera">Ligar Câmara</button>
    </main>

    <dialog id="modal-movimento">
      <form method="dialog" id="form-movimento">
        <h2>Registar Rota</h2>
        <p>Código Bipado: <strong id="modal-codigo-lido"></strong></p>

        <div class="input-wrapper">
          <label>Nome do Produto:</label>
          <input
            type="text"
            id="movimento-nome-produto"
            placeholder="Ex: Monitor Dell"
            required
          />
        </div>

        <div class="row-inputs">
          <div class="input-wrapper w-50">
            <label>Origem (Vem de):</label>
            <input
              type="text"
              id="movimento-origem"
              placeholder="Ex: Fornecedor X"
              required
            />
          </div>
          <div class="input-wrapper w-50">
            <label>Destino (Vai para):</label>
            <input
              type="text"
              id="movimento-destino"
              placeholder="Ex: Setor de TI"
              required
            />
          </div>
        </div>

        <div class="input-wrapper">
          <label>Tipo de Movimentação:</label>
          <select id="movimento-tipo">
            <option value="ENTRADA">Entrada (Adicionar ao Stock)</option>
            <option value="SAIDA">Saída (Retirar do Stock)</option>
          </select>
        </div>

        <div class="input-wrapper">
          <label>Quantidade:</label>
          <input type="number" id="movimento-qtd" value="1" min="1" required />
        </div>

        <div class="modal-botoes">
          <button type="submit" class="btn" id="salvar-movimento">
            Salvar Dados
          </button>
          <button type="button" class="btn btn-danger" id="cancelar-movimento">
            Cancelar
          </button>
        </div>
      </form>
    </dialog>

    <script src="scanner.js"></script>
  </body>
</html>
